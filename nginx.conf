server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location ~* \.(?:css|js|avif|png|svg|ico|jpg|xml|txt|json)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
